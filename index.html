<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-lg p-1">

            <div class="card-body p-4">
                <h2 class="text-center">Calculator</h2>
                <input type="text" placeholder="0" class="form-control inputValue mb-3" id="inputValue">

                <div class="row g-2 pb-2">
                    <div class="col-3">
                        <button class="btn btn-danger w-100 clear-btn">⌫</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100  square-btn">x²</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 cube-btn">x³</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">+</button>
                    </div>
                    
                </div>
                <div class="row g-2 pb-2">
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">7</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">8</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">9</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">*</button>
                    </div>
                </div>
                <div class="row g-2 pb-2">
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">4</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">5</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">6</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">-</button>
                    </div>
                </div>
                <div class="row g-2 pb-2">
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">1</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">2</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">3</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">/</button>
                    </div>
                </div>
                <div class="row g-2 pb-2">
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">0</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">.</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-outline-secondary w-100 calc-btn">%</button>
                    </div>
                    <div class="col-3">
                        <button class="btn btn-success w-100 equal-btn">=</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</body>

</html>
